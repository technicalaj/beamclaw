<?xml version="1.0" encoding="UTF-8"?>
<svg width="100%" viewBox="0 0 680 320" role="img" xmlns="http://www.w3.org/2000/svg">
<title>BeamClaw architecture: compile off-chip, beam by light, run forever on a 2KB chip</title>
<desc>Type, compile and safety-check, frame and CRC; then beamed by light to the chip which decodes, stores to EEPROM, and runs it forever in a 2KB VM.</desc>
<rect x="1" y="1" width="678" height="318" rx="16" fill="#0b0f15" stroke="#16252a"/>
<rect x="1" y="1" width="678" height="4" rx="2" fill="#37e0c4"/>
<text x="28" y="38" fill="#37e0c4" font-family="system-ui,sans-serif" font-size="13" letter-spacing="2">THE BEAMCLAW PIPELINE</text>
<text x="28" y="58" fill="#95a7ad" font-family="system-ui,sans-serif" font-size="13">The model thinks once, off-chip. The $3 chip then runs it forever &#8212; offline.</text>
<path d="M42,84 L42,90 L330,90 L330,84" fill="none" stroke="#37e0c4" stroke-width="1.3" opacity="0.7"/>
<text x="186" y="80" fill="#37e0c4" font-family="system-ui,sans-serif" font-size="10.5" text-anchor="middle">OFF-CHIP &#183; once, in your browser</text>
<path d="M420,84 L420,90 L610,90 L610,84" fill="none" stroke="#ffb454" stroke-width="1.3" opacity="0.7"/>
<text x="515" y="80" fill="#ffb454" font-family="system-ui,sans-serif" font-size="10.5" text-anchor="middle">ON THE $3 CHIP &#183; forever, offline</text>
<path d="M134,170 L140,170" stroke="#56707a" stroke-width="2" marker-end="url(#a)"/>
<path d="M232,170 L238,170" stroke="#56707a" stroke-width="2" marker-end="url(#a)"/>
<path d="M512,170 L518,170" stroke="#56707a" stroke-width="2" marker-end="url(#a)"/>
<defs><marker id="a" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L6,3.5 L0,7 z" fill="#56707a"/></marker></defs>
<g font-family="system-ui,sans-serif">
<rect x="42" y="110" width="92" height="120" rx="9" fill="#0e141b" stroke="#2a3a44"/>
<circle cx="88" cy="140" r="11" fill="none" stroke="#37e0c4"/><text x="88" y="144" fill="#37e0c4" font-size="12" text-anchor="middle">1</text>
<text x="88" y="180" fill="#eef5f3" font-size="13" font-weight="600" text-anchor="middle">Type it</text>
<text x="88" y="198" fill="#95a7ad" font-size="11" text-anchor="middle">plain words</text>
<rect x="140" y="110" width="92" height="120" rx="9" fill="#0e141b" stroke="#2a3a44"/>
<circle cx="186" cy="140" r="11" fill="none" stroke="#37e0c4"/><text x="186" y="144" fill="#37e0c4" font-size="12" text-anchor="middle">2</text>
<text x="186" y="180" fill="#eef5f3" font-size="13" font-weight="600" text-anchor="middle">Compile</text>
<text x="186" y="198" fill="#95a7ad" font-size="11" text-anchor="middle">+ safety check</text>
<rect x="238" y="110" width="92" height="120" rx="9" fill="#0e141b" stroke="#2a3a44"/>
<circle cx="284" cy="140" r="11" fill="none" stroke="#37e0c4"/><text x="284" y="144" fill="#37e0c4" font-size="12" text-anchor="middle">3</text>
<text x="284" y="180" fill="#eef5f3" font-size="13" font-weight="600" text-anchor="middle">Frame+CRC</text>
<text x="284" y="198" fill="#95a7ad" font-size="11" text-anchor="middle">&#8594; bytes</text>
<line x1="375" y1="104" x2="375" y2="236" stroke="#2a3a44" stroke-width="1.2" stroke-dasharray="4 4"/>
<rect x="338" y="158" width="13" height="24" rx="2" fill="#0b0f15" stroke="#37e0c4"/>
<circle cx="361" cy="170" r="2" fill="#ffd23f"/><circle cx="372" cy="170" r="2" fill="#ffd23f"/><circle cx="383" cy="170" r="2" fill="#ffd23f"/><circle cx="394" cy="170" r="2" fill="#ffd23f"/>
<rect x="401" y="160" width="13" height="20" rx="2" fill="#0b0f15" stroke="#ffb454"/>
<text x="375" y="214" fill="#ffd23f" font-size="11" font-weight="600" text-anchor="middle">LIGHT</text>
<text x="375" y="229" fill="#56707a" font-size="9.5" text-anchor="middle">no wires &#183; no radio</text>
<rect x="420" y="110" width="92" height="120" rx="9" fill="#0e141b" stroke="#3a3326"/>
<circle cx="466" cy="140" r="11" fill="none" stroke="#ffb454"/><text x="466" y="144" fill="#ffb454" font-size="12" text-anchor="middle">4</text>
<text x="466" y="180" fill="#eef5f3" font-size="13" font-weight="600" text-anchor="middle">Decode</text>
<text x="466" y="198" fill="#95a7ad" font-size="11" text-anchor="middle">&#8594; EEPROM</text>
<rect x="518" y="110" width="92" height="120" rx="9" fill="#0e141b" stroke="#3a3326"/>
<circle cx="564" cy="140" r="11" fill="none" stroke="#ffb454"/><text x="564" y="144" fill="#ffb454" font-size="12" text-anchor="middle">5</text>
<text x="564" y="178" fill="#eef5f3" font-size="13" font-weight="600" text-anchor="middle">Run forever</text>
<text x="564" y="196" fill="#95a7ad" font-size="11" text-anchor="middle">2 KB VM &#183; &#8734;</text>
</g>
<text x="340" y="276" fill="#6b7d84" font-family="system-ui,sans-serif" font-size="11.5" text-anchor="middle">No internet on the chip &#183; re-beam any time to change the behaviour</text>
</svg>
